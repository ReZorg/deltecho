name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: "pnpm"

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Workspace Dependencies
      run: |
        # Build workspace packages in dependency order so check:types
        # can resolve cross-package type declarations via symlinks.
        # Leaf packages first (no workspace deps), then dependents.
        pnpm --filter=deep-tree-echo-core build
        pnpm --filter=@deltecho/sys6-triality build
        pnpm --filter=@deltecho/dove9 build
        pnpm --filter=@deltecho/ipc build
        pnpm --filter=@deltecho/cognitive build
        pnpm --filter=deep-tree-echo-orchestrator build

    - name: Check (Lint, Types, Format)
      run: pnpm check

    - name: Unit Tests
      run: pnpm test

    - name: Build for E2E
      run: pnpm build:browser

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: packages/e2e-tests

    - name: Run E2E Tests
      run: pnpm --filter=e2e-tests e2e
      env:
        CI: true

    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-node${{ matrix.node-version }}
        path: packages/e2e-tests/playwright-report/
        retention-days: 30
